name = "islam-push"
main = "src/index.ts"
compatibility_date = "2026-06-21"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "islam-push-db"
# database_id will be filled in after TF creates the D1
# Run: terraform output d1_database_id (from cloudflare/personal/raharoho.me/pwa)
# Then paste the value here before deploying
database_id = "53ff7dbb-8b53-4b9d-91fd-2ba56aef3e84"

[vars]
VAPID_PUBLIC_KEY = "BO52m2RzNMPmB1E8ZeShL6uDgtx8qjSHjwkW7nt5AP2kqPUhilePDf_Vki89XUB3nqQ63jv7qBYaLqkgcDWi-DY"
VAPID_SUBJECT = "mailto:admin@raharoho.me"
LOG_LEVEL = "debug"
# How many seconds after the prayer time the PN should fire. Default 30.
# Set higher for more delay, lower for less. Never fires before the prayer time.
PN_BUFFER_SECONDS = "120"
# How long (in seconds) the push service should retain the message
# if the device is offline. After this time, the message is discarded.
# Default 21600 (6 hours). Set to 0 to use the web-push library default (4 weeks).
PN_TTL_SECONDS = "21600"

[observability]
enabled = true
